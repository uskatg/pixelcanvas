<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Pixel-Canvas — retromania</title>
<style>
  :root {
    --bg: #14130f;
    --panel: #1d1c17;
    --empty: #ffffff;      /* empty cell (white canvas) */
    --line: #2a2922;
    --text: #cfe0a8;
    --accent: #2d68b2;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    overflow: hidden; touch-action: none;
    /* no long-press text selection / callout while painting */
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
  }
  #nameInput { -webkit-user-select: text; user-select: text; }
  body { display: flex; flex-direction: column; }
  img { image-rendering: pixelated; }

  /* Host-only controls (choosing images, timer, clear) — hidden for players. */
  body:not(.admin) .adminonly { display: none !important; }

  /* ---- Header ---- */
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; background: var(--panel); border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 13px; margin: 0; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
  header h1 img { height: 24px; width: auto; }
  #me { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  #me img { width: 24px; height: 24px; border-radius: 5px; background:#fff; }
  #offline { display: none; font-size: 11px; color: #e8402a; white-space: nowrap; }
  body.offline #offline { display: inline; }
  #langToggle { font-size: 11px; padding: 3px 8px; letter-spacing: 1px; }
  #roster { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .count { font-size: 12px; opacity: .8; white-space: nowrap; }
  .joinbtn {
    font: inherit; font-size: 12px; background: transparent; color: var(--text);
    border: 1px solid var(--line); border-radius: 6px; padding: 4px 8px; cursor: pointer;
  }
  .taskbtn.active, #uploadBtn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ---- Upload modal (custom reference image) ---- */
  #uploadModal { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; align-items: center; justify-content: center; z-index: 45; padding: 20px; }
  #uploadModal.show { display: flex; }
  .upload-card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 20px; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 14px; max-height: 90vh; overflow-y: auto; }
  .upload-card h3 { margin: 0; font-size: 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
  #uploadPick { text-align: center; font: inherit; font-size: 14px; background: var(--accent); color: #fff; border-radius: 8px; padding: 10px; cursor: pointer; }
  #uploadPreview { min-height: 130px; background: #000; border: 1px solid var(--line); border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #uploadPreview img { max-width: 100%; max-height: 240px; image-rendering: auto; }
  #uploadHint { opacity: .5; font-size: 13px; }
  .upload-timer { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .upload-timer input { width: 60px; font: inherit; font-size: 15px; text-align: center; background: var(--bg); color: var(--text); border: 1px solid var(--line); border-radius: 6px; padding: 6px; }
  .upload-actions { display: flex; gap: 10px; }
  .upload-actions .ctrlbtn { flex: 1; }
  .upload-actions .ctrlbtn:disabled { opacity: .4; cursor: not-allowed; }

  /* ---- Canvas + player panel ---- */
  #stage { flex: 1; display: flex; min-height: 0; }
  #canvaswrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; min-width: 0; overflow: hidden; position: relative; }
  #players { width: clamp(96px, 28vw, 188px); flex: none; background: transparent; overflow-y: auto; padding: 12px 10px; }
  #players h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: .6; margin: 0 0 12px; }
  #playerlist { display: flex; flex-direction: column; gap: 10px; }
  .player { display: flex; align-items: center; gap: 8px; }
  .player img { width: 30px; height: 30px; border-radius: 7px; background: #fff; flex: none; }
  .player b { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .player.you b { color: var(--accent); }
  .player.you b::after { content: var(--you-suffix, " (du)"); opacity: .5; font-size: 11px; }
  .player.mutable { cursor: pointer; border-radius: 6px; }
  .player.mutable:hover { background: rgba(255,255,255,.05); }
  .player.muted b { text-decoration: line-through; opacity: .5; }
  .player.muted::after { content: "🔇"; margin-left: auto; font-size: 13px; }
  #frame { position: relative; line-height: 0; border: 1px solid var(--line); box-shadow: 0 0 0 4px #000, 0 10px 40px rgba(0,0,0,.6); }
  #canvas { background: var(--empty); image-rendering: pixelated; display: block; touch-action: none; }
  #grid { position: absolute; top: 0; left: 0; pointer-events: none; }

  /* ---- Beamer / projector mode (?beamer=1): big canvas, persistent QR, no
         palette or join lobby — the presenter's shared screen ---- */
  #beamerpanel { display: none; }
  body.beamer #players { display: block; width: clamp(180px, 24vw, 320px); }
  body.beamer #players h3, body.beamer #playerlist { display: none; }
  body.beamer #beamerpanel { display: flex; flex-direction: column; align-items: center; gap: 16px; padding-top: 8px; }
  body.beamer .palette { display: none; }
  body.beamer #me, body.beamer #showJoin { display: none; }
  #beamerqr { background: #fff; padding: 12px; border-radius: 12px; line-height: 0; min-width: 120px; min-height: 120px; display: flex; align-items: center; justify-content: center; }
  #beamerqr img { display: block; width: 100%; max-width: 240px; height: auto; }
  #beamerjoin { font-size: 14px; opacity: .85; text-align: center; line-height: 1.4; }
  #beamercount { font-size: 22px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
  /* In beamer mode the timer should dominate the reference column. */
  body.beamer #timer { font-size: clamp(44px, 8vw, 72px); }
  body.beamer #reference { width: clamp(160px, 24vw, 340px); }

  /* ---- Reference task panel (left) + timer ---- */
  #reference {
    width: clamp(130px, 26vw, 320px); flex: none; background: var(--panel);
    border-right: 1px solid var(--line); display: flex; flex-direction: column;
    gap: 12px; padding: 12px 10px; overflow-y: auto;
  }
  #reference.hide { display: none; }
  #reference h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; opacity: .6; margin: 0; }
  #refimg-wrap { background: #000; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; line-height: 0; }
  #refimg { width: 100%; height: auto; display: block; image-rendering: auto; }
  #timerbox { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  #timer { font-size: clamp(30px, 7vw, 46px); font-weight: 700; letter-spacing: 2px; font-variant-numeric: tabular-nums; }
  #timer.warn { color: #e8402a; }
  #similarity { display: none; font-size: 13px; opacity: .85; color: var(--accent); font-variant-numeric: tabular-nums; }
  body.beamer #similarity { font-size: 20px; }
  #timer-controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .ctrlbtn { font: inherit; font-size: 13px; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 12px; cursor: pointer; }
  .ctrlbtn.alt { background: transparent; color: var(--text); border: 1px solid var(--line); }
  #refClose { margin-top: auto; }

  /* ---- Mobile: the canvas is the whole stage ---- */
  /* No player list; the reference becomes a slim strip above the canvas
     instead of a side column, so the canvas gets the full width. */
  @media (max-width: 760px) {
    #players { display: none; }
    #stage { flex-direction: column; }
    #reference {
      width: 100%; flex-direction: row; align-items: center; gap: 10px;
      border-right: none; border-bottom: 1px solid var(--line);
      padding: 8px 10px; overflow-x: auto; overflow-y: hidden;
    }
    #reference h3 { display: none; }
    #refimg-wrap { width: 76px; flex: none; }
    #timerbox { gap: 4px; }
    #timer { font-size: 26px; }
    #timer-controls { flex-wrap: nowrap; }
    .ctrlbtn { white-space: nowrap; }
    #refClose { margin-top: 0; margin-left: auto; }
    #canvaswrap { padding: 6px; }
    .palette { gap: 6px; padding: 8px; }
    .swatch { width: 36px; height: 36px; }
  }

  /* ---- Palette ---- */
  .palette {
    display: flex; gap: 8px; justify-content: center; align-items: center;
    padding: 12px; padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: var(--panel); border-top: 1px solid var(--line); flex-wrap: wrap;
  }
  .swatch { width: 44px; height: 44px; border-radius: 8px; border: 2px solid #000; cursor: pointer; position: relative; transition: transform .07s; }
  .swatch.sel { transform: translateY(-6px) scale(1.08); box-shadow: 0 0 0 2px var(--accent); }
  .swatch.eraser { background: #fff url("/eraser.webp") center / 80% no-repeat; }

  /* ---- Join lobby ---- */
  #lobby {
    position: fixed; inset: 0; z-index: 20; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    padding: 28px 20px max(20px, env(safe-area-inset-bottom)); overflow-y: auto;
  }
  #lobby.hide { display: none; }
  #lobby h2 { color: var(--accent); font-size: 18px; letter-spacing: 1px; margin: 6px 0 0; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
  #lobby h2 img { height: 40px; width: auto; }
  #lobby .sub { font-size: 13px; opacity: .7; text-align: center; margin: -8px 0 4px; }
  .icongrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 360px; }
  .icon {
    background: var(--bg); border: 3px solid var(--line); border-radius: 14px; padding: 10px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: transform .08s; position: relative;
  }
  .icon img { width: 100%; max-width: 92px; aspect-ratio: 1; object-fit: contain; }
  .icon.sel { border-color: var(--accent); transform: translateY(-4px) scale(1.04); box-shadow: 0 0 0 3px var(--accent), 0 8px 20px rgba(0,0,0,.5); }
  #nameInput {
    width: 100%; max-width: 360px; font: inherit; font-size: 16px; text-align: center;
    background: var(--panel); color: var(--text); border: 2px solid var(--line);
    border-radius: 10px; padding: 12px 14px; outline: none;
  }
  #nameInput:focus { border-color: var(--accent); }
  #joinBtn {
    width: 100%; max-width: 360px; font: inherit; font-size: 16px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase; color: #fff; background: var(--accent);
    border: none; border-radius: 10px; padding: 14px; cursor: pointer;
  }
  #joinBtn:disabled { opacity: .35; cursor: not-allowed; }

  /* ---- Reference lightbox (tap the small reference to see it big) ---- */
  #reference #refimg { cursor: zoom-in; }
  #refbox { position: fixed; inset: 0; background: rgba(0,0,0,.92); display: none; align-items: center; justify-content: center; z-index: 35; padding: 20px; cursor: zoom-out; }
  #refbox.show { display: flex; }
  #refbox img { max-width: 100%; max-height: 100%; image-rendering: auto; border-radius: 8px; box-shadow: 0 10px 50px rgba(0,0,0,.7); }

  /* ---- QR overlay ---- */
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 18px; z-index: 30; padding: 24px; text-align: center; }
  #overlay.show { display: flex; }
  #qr { background: #fff; padding: 14px; border-radius: 10px; min-width: 180px; min-height: 180px; }
  #overlay .joinbtn { font-size: 14px; padding: 8px 16px; }

  /* ---- Time-up modal ---- */
  #timeup { position: fixed; inset: 0; background: rgba(0,0,0,.9); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 40; padding: 24px; text-align: center; }
  #timeup.show { display: flex; }
  #timeup .big { font-size: clamp(30px, 9vw, 64px); font-weight: 700; letter-spacing: 2px; color: #e8402a; text-transform: uppercase; }
  #timeup .sub2 { font-size: 15px; opacity: .75; }
  #timeup .replay { display: none; image-rendering: pixelated; background: #fff; border-radius: 8px; box-shadow: 0 0 0 3px #000, 0 10px 40px rgba(0,0,0,.6); max-width: min(80vw, 320px); height: auto; }
  #timeup .replay.show { display: block; }
  #timeup .rating { font-size: clamp(34px, 10vw, 64px); font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; min-height: 1.1em; }
  #timeup .rating.loading { font-size: 16px; font-weight: 400; color: var(--text); opacity: .8; letter-spacing: 1px; }
  #timeup .evalfb { font-size: 16px; max-width: 440px; line-height: 1.45; opacity: .9; }
  #timeup .statslist { display: flex; flex-direction: column; gap: 7px; width: 100%; max-width: 340px; margin-top: 4px; }
  #timeup .statsrow { display: flex; align-items: center; gap: 10px; font-size: 15px; }
  #timeup .statsrow .rank { width: 24px; text-align: center; flex: none; }
  #timeup .statsrow img { width: 26px; height: 26px; border-radius: 6px; background: #fff; flex: none; }
  #timeup .statsrow b { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #timeup .statsrow .n { margin-left: auto; font-variant-numeric: tabular-nums; opacity: .75; flex: none; }
  #timeup .joinbtn { font-size: 15px; padding: 10px 20px; }
</style>
</head>
<body>
  <!-- Join lobby (shown first after scanning the QR) -->
  <div id="lobby">
    <h2><img src="/logo.webp" alt="" />Pixel-Canvas</h2>
    <div class="sub">Wähle deinen Charakter & gib deinen Namen ein</div>
    <div class="icongrid" id="icongrid"></div>
    <input id="nameInput" type="text" maxlength="24" placeholder="Dein Name" autocomplete="off" />
    <button id="joinBtn" disabled>Beitreten</button>
  </div>

  <!-- Canvas app -->
  <header>
    <h1><img src="/logo.webp" alt="" />Pixel-Canvas</h1>
    <button class="joinbtn" id="langToggle">DE</button>
    <span id="me"></span>
    <span id="offline">⚠ offline</span>
    <div id="roster">
      <button class="joinbtn taskbtn adminonly" data-task="1">Bild 1</button>
      <button class="joinbtn taskbtn adminonly" data-task="2">Bild 2</button>
      <button class="joinbtn adminonly" id="uploadBtn">Upload</button>
      <button class="joinbtn adminonly" id="clearHeader">Leeren</button>
      <span class="count" id="count">– online</span>
      <button class="joinbtn" id="showJoin">QR</button>
    </div>
  </header>

  <div id="stage">
    <aside id="reference" class="hide">
      <h3>Vorlage</h3>
      <div id="refimg-wrap"><img id="refimg" alt="Vorlage" /></div>
      <div id="timerbox">
        <div id="timer">03:00</div>
        <div id="similarity"></div>
        <div id="timer-controls" class="adminonly">
          <button class="ctrlbtn" id="timerStart">▶ Start</button>
          <button class="ctrlbtn alt" id="timerReset">↺ Reset</button>
        </div>
      </div>
      <button class="ctrlbtn alt adminonly" id="canvasReset">🗑 Canvas leeren</button>
      <button class="ctrlbtn alt adminonly" id="refClose">✕ Schließen</button>
    </aside>
    <div id="canvaswrap">
      <div id="frame">
        <canvas id="canvas"></canvas>
        <canvas id="grid"></canvas>
      </div>
    </div>
    <aside id="players">
      <h3>Spieler·innen</h3>
      <div id="playerlist"></div>
      <div id="beamerpanel">
        <div id="beamerqr">…</div>
        <div id="beamerjoin">Scanne den QR-Code<br>zum Mitmalen</div>
        <div id="beamercount">– online</div>
      </div>
    </aside>
  </div>

  <div class="palette" id="palette"></div>

  <div id="overlay">
    <div id="qr">…</div>
    <button class="joinbtn" id="hideJoin">Schließen</button>
  </div>

  <div id="refbox"><img id="refbox-img" alt="Vorlage" /></div>

  <div id="timeup">
    <div class="big">⏰ Zeit ist um!</div>
    <div class="sub2">Die Zeit ist vorbei.</div>
    <canvas id="replay" class="replay"></canvas>
    <div id="rating" class="rating"></div>
    <div id="evalFeedback" class="evalfb"></div>
    <div id="statsList" class="statslist"></div>
    <button class="joinbtn" id="timeupClose">Schließen</button>
  </div>

  <!-- Upload own reference image + set timer, then start a custom round -->
  <div id="uploadModal">
    <div class="upload-card">
      <h3 id="uploadTitle">Eigenes Bild hochladen</h3>
      <label id="uploadPick" for="uploadFile">Bild wählen</label>
      <input id="uploadFile" type="file" accept="image/*" hidden />
      <div id="uploadPreview"><span id="uploadHint">Noch kein Bild gewählt</span></div>
      <div class="upload-timer">
        <span id="uploadTimeLabel">Zeit:</span>
        <input id="uploadMin" type="number" min="0" max="60" value="3" inputmode="numeric" />
        <span>:</span>
        <input id="uploadSec" type="number" min="0" max="59" value="0" inputmode="numeric" />
      </div>
      <div class="upload-actions">
        <button class="ctrlbtn" id="uploadStart" disabled>Start</button>
        <button class="ctrlbtn alt" id="uploadCancel">Abbrechen</button>
      </div>
    </div>
  </div>

<script>
let W = 64, H = 64, PALETTE = [], EMPTY = -1, ICONS = [];
let grid = [];
let current = 0;          // selected palette index (EMPTY = eraser)
let cellPx = 10;          // canvas pixels per cell
let me = null;            // { name, icon }  current player
let pickedIcon = null;    // selected icon src in the lobby

// ---- i18n (DE default) -------------------------------------------------------
// The DE/EN toggle next to the logo switches the whole UI; the choice persists.
const I18N = {
  de: {
    lobbySub: "Wähle deinen Charakter & gib deinen Namen ein",
    namePlaceholder: "Dein Name", joinBtn: "Beitreten",
    task1: "Bild 1", task2: "Bild 2", clear: "Leeren", canvasClear: "Canvas leeren",
    qr: "QR", vorlage: "Vorlage", start: "Start", pause: "Pause", reset: "Reset", close: "Schließen",
    players: "Spieler·innen", beamerJoin: "Scanne den QR-Code<br>zum Mitmalen",
    timeUpBig: "⏰ Zeit ist um!", timeUpSub: "Die Zeit ist vorbei.",
    online: "online", match: "Übereinstimmung", offline: "⚠ offline",
    evalRunning: "Bewertung läuft …", connFail: "Verbindung fehlgeschlagen — neuer Versuch …",
    confirmClear: "Canvas wirklich für alle leeren?", muteTitle: "Klicken zum Stummschalten",
    adminInvalid: "Admin-Token ungültig.", adminSpectator: "Admin-Token ungültig — Zuschauer-Modus.",
    upload: "Upload", uploadTitle: "Eigenes Bild hochladen", uploadPick: "Bild wählen",
    uploadHint: "Noch kein Bild gewählt", uploadTime: "Zeit:", cancel: "Abbrechen",
    youSuffix: '" (du)"',
  },
  en: {
    lobbySub: "Choose your character & enter your name",
    namePlaceholder: "Your name", joinBtn: "Join",
    task1: "Image 1", task2: "Image 2", clear: "Clear", canvasClear: "Clear canvas",
    qr: "QR", vorlage: "Reference", start: "Start", pause: "Pause", reset: "Reset", close: "Close",
    players: "Players", beamerJoin: "Scan the QR code<br>to join in",
    timeUpBig: "⏰ Time's up!", timeUpSub: "The time is over.",
    online: "online", match: "Match", offline: "⚠ offline",
    evalRunning: "Evaluating …", connFail: "Connection failed — retrying …",
    confirmClear: "Really clear the canvas for everyone?", muteTitle: "Click to mute",
    adminInvalid: "Invalid admin token.", adminSpectator: "Invalid admin token — spectator mode.",
    upload: "Upload", uploadTitle: "Upload your own image", uploadPick: "Choose image",
    uploadHint: "No image selected yet", uploadTime: "Time:", cancel: "Cancel",
    youSuffix: '" (you)"',
  },
};
let lang = localStorage.getItem("pc_lang") === "en" ? "en" : "de";
function t(key) { return I18N[lang][key]; }
function applyLang() {
  const T = I18N[lang];
  document.documentElement.lang = lang;
  document.documentElement.style.setProperty("--you-suffix", T.youSuffix);
  document.getElementById("langToggle").textContent = lang.toUpperCase();
  const set = (sel, txt) => { const e = document.querySelector(sel); if (e) e.textContent = txt; };
  set("#lobby .sub", T.lobbySub);
  const nm = document.getElementById("nameInput"); if (nm) nm.placeholder = T.namePlaceholder;
  set("#joinBtn", T.joinBtn);
  document.querySelectorAll(".taskbtn").forEach((b) => { b.textContent = T["task" + b.dataset.task]; });
  set("#clearHeader", T.clear);
  set("#canvasReset", "🗑 " + T.canvasClear);
  set("#showJoin", T.qr);
  set("#reference h3", T.vorlage);
  set("#timerReset", "↺ " + T.reset);
  set("#refClose", "✕ " + T.close);
  set("#players h3", T.players);
  const bj = document.getElementById("beamerjoin"); if (bj) bj.innerHTML = T.beamerJoin;
  set("#timeup .big", T.timeUpBig);
  set("#timeup .sub2", T.timeUpSub);
  set("#timeupClose", T.close);
  set("#hideJoin", T.close);
  set("#offline", T.offline);
  set("#uploadBtn", T.upload);
  set("#uploadTitle", T.uploadTitle);
  set("#uploadPick", T.uploadPick);
  set("#uploadHint", T.uploadHint);
  set("#uploadTimeLabel", T.uploadTime);
  set("#uploadStart", T.start);
  set("#uploadCancel", T.cancel);
  if (typeof timerTick === "function") timerTick();       // refresh Start/Pause label
  if (typeof updateSimilarity === "function") updateSimilarity();
}
function toggleLang() {
  lang = lang === "de" ? "en" : "de";
  try { localStorage.setItem("pc_lang", lang); } catch {}
  applyLang();
}

// ---- Admin token -------------------------------------------------------------
// The presenter opens /?admin=<token>. The token is stashed in localStorage and
// removed from the URL so it never shows on the beamer or in the QR code.
const bootParams = new URLSearchParams(location.search);
const urlAdmin = bootParams.get("admin");
if (urlAdmin !== null) {
  localStorage.setItem("pc_admin", urlAdmin);
  bootParams.delete("admin");
  const q = bootParams.toString();
  history.replaceState(null, "", location.pathname + (q ? "?" + q : ""));
}
const ADMIN_TOKEN = localStorage.getItem("pc_admin") || "";
let isAdmin = false;
const mutedIds = new Set(); // host's view of who is muted (admin only)

// Countdown length the host uses when opening a task; override with ?t=<seconds>.
const TASK_SECONDS = Math.max(5, parseInt(bootParams.get("t"), 10) || 180);

// Beamer / projector mode: display-only shared screen (no join, no painting,
// persistent QR). Combine with ?admin=<token> so the presenter's screen also
// controls the round: /?admin=<token>&beamer=1
const isBeamer = bootParams.get("beamer") === "1";

// Stable per-device id for the presence roster.
let clientId = localStorage.getItem("pc_id");
if (!clientId) {
  clientId = Math.random().toString(36).slice(2, 12);
  localStorage.setItem("pc_id", clientId);
}

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const gridCanvas = document.getElementById("grid");
const gctx = gridCanvas.getContext("2d");

function colorOf(c) { return c === EMPTY ? null : PALETTE[c]; }

function drawCell(x, y) {
  const col = colorOf(grid[y * W + x]);
  if (col === null) ctx.clearRect(x * cellPx, y * cellPx, cellPx, cellPx);
  else { ctx.fillStyle = col; ctx.fillRect(x * cellPx, y * cellPx, cellPx, cellPx); }
}

function redrawAll() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++)
      if (grid[y * W + x] !== EMPTY) drawCell(x, y);
}

function layout() {
  const wrap = document.getElementById("canvaswrap");
  const rect = wrap.getBoundingClientRect();
  // Fit the W×H grid into the available box, keeping square cells.
  const availW = Math.max(60, rect.width - 4);
  const availH = Math.max(60, rect.height - 4);
  cellPx = Math.max(4, Math.floor(Math.min(availW / W, availH / H)));
  const pxW = cellPx * W, pxH = cellPx * H;
  canvas.width = pxW; canvas.height = pxH;
  canvas.style.width = pxW + "px"; canvas.style.height = pxH + "px";
  redrawAll();
  drawGrid();
}

// Semitransparent grey grid on a separate overlay canvas (one line per cell).
function drawGrid() {
  const pxW = canvas.width, pxH = canvas.height;
  gridCanvas.width = pxW; gridCanvas.height = pxH;
  gridCanvas.style.width = pxW + "px"; gridCanvas.style.height = pxH + "px";
  gctx.clearRect(0, 0, pxW, pxH);
  gctx.strokeStyle = "rgba(120,120,120,0.28)";
  gctx.lineWidth = 1;
  gctx.beginPath();
  for (let i = 0; i <= W; i++) {
    const p = Math.round(i * cellPx) + 0.5;
    gctx.moveTo(p, 0); gctx.lineTo(p, pxH);
  }
  for (let i = 0; i <= H; i++) {
    const p = Math.round(i * cellPx) + 0.5;
    gctx.moveTo(0, p); gctx.lineTo(pxW, p);
  }
  gctx.stroke();
}

// ---- Painting --------------------------------------------------------------
// Optimistic drawing with batched uploads: strokes render locally right away,
// queue up, and are flushed as ONE request every 200ms (a fast drag used to be
// dozens of parallel requests, which lagged and made pixels flicker).
// A painted cell is protected from being overwritten by poll data until the
// server has confirmed the batch AND a poll that started after that
// confirmation has come back.
const pending = new Map();   // cellIndex -> { c, ts, ack }
const sendQueue = new Map(); // cellIndex -> c
let painting = false, lastKey = "";
// Cells painted in the current stroke (idx + previous color), so an accidental
// dot from the first finger of a pinch-zoom can be undone when the 2nd lands.
let strokeStart = 0;
const strokeCells = [];
function cellFromEvent(e) {
  const r = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - r.left) / r.width * W);
  const y = Math.floor((e.clientY - r.top) / r.height * H);
  if (x < 0 || x >= W || y < 0 || y >= H) return null;
  return { x, y };
}
function paintAt(x, y) {
  // Round over → canvas frozen (matches the server-side guard in api/paint.js)
  // until the host starts a new round or closes the task.
  if (curTask && deadline !== null && serverNow() >= deadline) return;
  const key = x + "," + y;
  if (key === lastKey) return;
  lastKey = key;
  const idx = y * W + x;
  if (grid[idx] === current) return;
  strokeCells.push({ idx, prev: grid[idx] });
  grid[idx] = current;
  pending.set(idx, { c: current, ts: Date.now(), ack: 0 });
  sendQueue.set(idx, current);
  drawCell(x, y);
}
// Undo the current stroke (used when a pinch-zoom starts): restore each cell's
// previous color and queue that value so an already-flushed dot is corrected.
function revertStroke() {
  const now = Date.now();
  for (let i = strokeCells.length - 1; i >= 0; i--) {
    const { idx, prev } = strokeCells[i];
    grid[idx] = prev;
    pending.set(idx, { c: prev, ts: now, ack: 0 });
    sendQueue.set(idx, prev);
    drawCell(idx % W, Math.floor(idx / W));
  }
  strokeCells.length = 0;
}
// Consecutive network failures (poll or paint flush) show an offline badge.
let netFails = 0;
function netStatus(ok) {
  netFails = ok ? 0 : netFails + 1;
  document.body.classList.toggle("offline", netFails >= 2);
}
async function flushPaints() {
  if (!sendQueue.size) return;
  const cells = [];
  for (const [idx, c] of sendQueue) cells.push({ x: idx % W, y: Math.floor(idx / W), c });
  sendQueue.clear();
  const sentW = W, sentH = H;
  let ok = false;
  try {
    const r = await fetch("/api/paint", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ cells, id: clientId }), keepalive: true,
    });
    ok = r.ok;
    if (ok) {
      const t = Date.now();
      for (const cell of cells) {
        const p = pending.get(cell.y * W + cell.x);
        if (p && p.c === cell.c) p.ack = t;
      }
    }
  } catch { /* handled below */ }
  netStatus(ok);
  if (!ok && W === sentW && H === sentH) {
    // Failed flush (flaky Wi-Fi): re-queue the batch so the stroke isn't lost —
    // unless the cell was repainted meanwhile (newer color wins) or the grid
    // was reshaped by a task switch (old indexes would be garbage).
    const t = Date.now();
    for (const cell of cells) {
      const idx = cell.y * W + cell.x;
      if (!sendQueue.has(idx)) {
        sendQueue.set(idx, cell.c);
        const p = pending.get(idx);
        if (p && p.c === cell.c) p.ts = t; // keep the local render protected
      }
    }
  }
}
setInterval(flushPaints, 200);
window.addEventListener("pagehide", () => {
  if (!sendQueue.size) return;
  const cells = [];
  for (const [idx, c] of sendQueue) cells.push({ x: idx % W, y: Math.floor(idx / W), c });
  sendQueue.clear();
  navigator.sendBeacon("/api/paint", new Blob([JSON.stringify({ cells, id: clientId })], { type: "application/json" }));
});
canvas.addEventListener("pointerdown", (e) => {
  if (isBeamer) return; // projector view is display-only
  e.preventDefault();
  if (touches.size >= 2 || pinch) return; // second finger = zoom, not paint
  painting = true; lastKey = "";
  strokeStart = Date.now();
  strokeCells.length = 0;
  canvas.setPointerCapture(e.pointerId);
  const c = cellFromEvent(e); if (c) paintAt(c.x, c.y);
});
canvas.addEventListener("pointermove", (e) => {
  if (!painting || pinch) return; e.preventDefault();
  const c = cellFromEvent(e); if (c) paintAt(c.x, c.y);
});
function stop() { painting = false; lastKey = ""; }
canvas.addEventListener("pointerup", stop);
canvas.addEventListener("pointercancel", stop);

// ---- Pinch zoom (mobile) ------------------------------------------------------
// Two fingers on the canvas area zoom/pan the canvas itself (the page stays
// fixed). One finger always paints, also while zoomed in.
const wrapEl = document.getElementById("canvaswrap");
const frameEl = document.getElementById("frame");
const touches = new Map(); // pointerId -> {x, y}
let zoom = 1, panX = 0, panY = 0, pinch = null;
function applyTransform() {
  frameEl.style.transform = zoom === 1 ? "" : "translate(" + panX + "px," + panY + "px) scale(" + zoom + ")";
}
function resetZoom() { zoom = 1; panX = 0; panY = 0; pinch = null; applyTransform(); }
function clampPan() {
  const mx = frameEl.offsetWidth * zoom / 2, my = frameEl.offsetHeight * zoom / 2;
  panX = Math.max(-mx, Math.min(mx, panX));
  panY = Math.max(-my, Math.min(my, panY));
}
wrapEl.addEventListener("pointerdown", (e) => {
  if (e.pointerType !== "touch") return;
  touches.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (touches.size === 2) {
    painting = false; lastKey = "";
    // Undo an accidental dot the first finger just placed before the pinch —
    // only if the stroke just began and is tiny (a real drag is left alone).
    if (Date.now() - strokeStart < 350 && strokeCells.length && strokeCells.length <= 3) revertStroke();
    const [a, b] = [...touches.values()];
    pinch = {
      d0: Math.hypot(a.x - b.x, a.y - b.y) || 1,
      mid0: { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 },
      z0: zoom, panX0: panX, panY0: panY,
    };
  }
}, true);
wrapEl.addEventListener("pointermove", (e) => {
  if (!touches.has(e.pointerId)) return;
  touches.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (!pinch || touches.size < 2) return;
  const [a, b] = [...touches.values()];
  const d = Math.hypot(a.x - b.x, a.y - b.y) || 1;
  const mid = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
  const r = wrapEl.getBoundingClientRect();
  const c = { x: r.left + r.width / 2, y: r.top + r.height / 2 }; // frame is flex-centered in the wrap
  const z = Math.min(8, Math.max(1, pinch.z0 * (d / pinch.d0)));
  // keep the pinch midpoint anchored; moving both fingers together pans
  panX = (mid.x - c.x) - ((pinch.mid0.x - c.x) - pinch.panX0) * (z / pinch.z0);
  panY = (mid.y - c.y) - ((pinch.mid0.y - c.y) - pinch.panY0) * (z / pinch.z0);
  zoom = z;
  if (zoom === 1) { panX = 0; panY = 0; }
  clampPan();
  applyTransform();
}, true);
function endTouch(e) {
  touches.delete(e.pointerId);
  if (touches.size < 2) pinch = null;
}
wrapEl.addEventListener("pointerup", endTouch, true);
wrapEl.addEventListener("pointercancel", endTouch, true);

// ---- Palette UI ------------------------------------------------------------
function buildPalette() {
  const wrap = document.getElementById("palette");
  wrap.innerHTML = "";
  PALETTE.forEach((col, i) => {
    const b = document.createElement("div");
    b.className = "swatch" + (i === current ? " sel" : "");
    b.style.background = col;
    b.onclick = () => select(i);
    wrap.appendChild(b);
  });
  const er = document.createElement("div");
  er.className = "swatch eraser" + (current === EMPTY ? " sel" : "");
  er.title = "Radierer";
  er.onclick = () => select(EMPTY);
  wrap.appendChild(er);
}
function select(i) {
  current = i;
  const swatches = document.querySelectorAll(".swatch");
  swatches.forEach((s) => s.classList.remove("sel"));
  if (i === EMPTY) swatches[swatches.length - 1].classList.add("sel");
  else swatches[i].classList.add("sel");
}

// ---- Live sync (polling) -----------------------------------------------------
// The server is serverless (Vercel), so instead of SSE every client polls
// /api/poll: grid + shared task/timer state + roster, about once per second.
const POLL_MS = 1200;
let clockOffset = 0;      // serverNow - localNow, so timers use server time
let pollBusy = false, pollAgain = false;

function serverNow() { return Date.now() + clockOffset; }

function decodeCell(ch) { return ch === "." ? EMPTY : ch.charCodeAt(0) - 48; }

// A locally painted cell wins over poll data until the server confirmed its
// batch and this poll started after that confirmation (otherwise a response
// that was generated before our stroke landed would erase it for a moment).
function applyGrid(encoded, pollStart) {
  if (encoded.length !== W * H) return;
  const now = Date.now();
  for (const [k, p] of pending) {
    if ((p.ack && pollStart > p.ack) || now - p.ts > 10000) pending.delete(k);
  }
  for (let i = 0; i < encoded.length; i++) {
    const pend = pending.get(i);
    const want = pend ? pend.c : decodeCell(encoded[i]);
    if (grid[i] !== want) { grid[i] = want; drawCell(i % W, Math.floor(i / W)); }
  }
}

// ---- Timelapse recording + replay -------------------------------------------
// Every client records the shared grid string each poll during a round, then
// plays it back on the time-up modal. Pure client-side; ~150 frames/round.
let frames = [], recordRound = null, replayTimer = null;
function recordFrame(encoded) {
  if (!curTask || deadline === null) return;
  if (deadline !== recordRound) { recordRound = deadline; frames = []; } // new round
  if (serverNow() < deadline + 1500 && frames.length < 400 && encoded.length === W * H) {
    frames.push(encoded);
  }
}
function drawReplayFrame(rctx, enc, scale) {
  rctx.fillStyle = "#ffffff";
  rctx.fillRect(0, 0, rctx.canvas.width, rctx.canvas.height);
  for (let idx = 0; idx < enc.length; idx++) {
    const c = decodeCell(enc[idx]);
    if (c === EMPTY) continue;
    rctx.fillStyle = PALETTE[c];
    rctx.fillRect((idx % W) * scale, Math.floor(idx / W) * scale, scale, scale);
  }
}
function playTimelapse() {
  const rc = document.getElementById("replay");
  clearInterval(replayTimer); replayTimer = null;
  if (frames.length < 2 || frames[0].length !== W * H) { rc.classList.remove("show"); return; }
  const scale = Math.max(2, Math.floor(300 / Math.max(W, H)));
  rc.width = W * scale; rc.height = H * scale;
  rc.classList.add("show");
  const rctx = rc.getContext("2d");
  const total = frames.length;
  const step = Math.max(1, Math.round(total / 45)); // ~45 draws over the run
  let i = 0;
  replayTimer = setInterval(() => {
    if (i >= total) {
      drawReplayFrame(rctx, frames[total - 1], scale); // land on the final frame
      clearInterval(replayTimer); replayTimer = null;
      return;
    }
    drawReplayFrame(rctx, frames[i], scale);
    i += step;
  }, 90);
}

// ---- Live similarity meter (admin / beamer view only) ------------------------
// Downsample the reference to the grid, snap each cell to the nearest palette
// colour, and show how much of the shared canvas already agrees with it. Pure
// client-side; the AI judge at the end is the authoritative score.
let targetGrid = null; // Int8Array of nearest-palette indices, or null
function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}
function computeTarget() {
  targetGrid = null;
  if (!curTask) return;
  const img = document.getElementById("refimg");
  if (!img.complete || !img.naturalWidth) return; // wait for the load event
  try {
    const off = document.createElement("canvas");
    off.width = W; off.height = H;
    const octx = off.getContext("2d");
    octx.drawImage(img, 0, 0, W, H);
    const data = octx.getImageData(0, 0, W, H).data;
    const pal = PALETTE.map(hexToRgb);
    const t = new Int8Array(W * H);
    for (let i = 0; i < W * H; i++) {
      const r = data[i * 4], g = data[i * 4 + 1], b = data[i * 4 + 2];
      let best = 0, bestD = Infinity;
      for (let k = 0; k < pal.length; k++) {
        const dr = r - pal[k][0], dg = g - pal[k][1], db = b - pal[k][2];
        const d = dr * dr + dg * dg + db * db;
        if (d < bestD) { bestD = d; best = k; }
      }
      t[i] = best;
    }
    targetGrid = t;
  } catch { targetGrid = null; } // getImageData can fail if the image isn't ready
}
function updateSimilarity() {
  const el = document.getElementById("similarity");
  if (!el) return;
  if (!(isAdmin || isBeamer) || !curTask || !targetGrid || targetGrid.length !== grid.length) {
    el.style.display = "none";
    return;
  }
  const white = PALETTE.indexOf("#ffffff"); // an empty cell reads as white
  let match = 0;
  for (let i = 0; i < targetGrid.length; i++) {
    const pj = grid[i] === EMPTY ? white : grid[i];
    if (pj === targetGrid[i]) match++;
  }
  el.style.display = "block"; // explicit — "" would fall back to the CSS default (none)
  el.textContent = t("match") + ": " + Math.round(match / targetGrid.length * 100) + "%";
}

async function poll() {
  // Hidden tab: skip polling entirely — a forgotten open tab would otherwise
  // keep burning ~4 Redis commands every 1.2s against the Upstash quota.
  if (document.hidden) return;
  if (pollBusy) { pollAgain = true; return; }
  pollBusy = true;
  const started = Date.now();
  try {
    let q = "";
    if (me) {
      q = "?id=" + encodeURIComponent(clientId) +
          "&name=" + encodeURIComponent(me.name) +
          "&icon=" + encodeURIComponent(me.icon);
    }
    const data = await (await fetch("/api/poll" + q, { cache: "no-store" })).json();
    clockOffset = data.now - Date.now();
    applyState(data.state);
    applyGrid(data.grid, started);
    recordFrame(data.grid);
    renderRoster(data.players || []);
    updateSimilarity();
    netStatus(true);
  } catch { netStatus(false); /* transient network error — next poll will catch up */ }
  pollBusy = false;
  if (pollAgain) { pollAgain = false; poll(); }
}
function pollNow() { poll(); }

function renderRoster(list) {
  // Dedupe identical name+icon (e.g. the same person on two tabs).
  const seen = new Set();
  const players = list.filter((p) => {
    if (!p.name) return false;
    const k = p.name + "|" + p.icon;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });
  document.getElementById("count").textContent = players.length + " online";
  document.getElementById("beamercount").textContent = players.length + " online";
  const el = document.getElementById("playerlist");
  el.innerHTML = "";
  players.forEach((p) => {
    const row = document.createElement("div");
    const mine = me && p.name === me.name && p.icon === me.icon;
    const muted = p.id && mutedIds.has(p.id);
    row.className = "player" + (mine ? " you" : "") + (isAdmin && p.id ? " mutable" : "") + (muted ? " muted" : "");
    const img = new Image(); img.src = p.icon; img.alt = p.name;
    const nm = document.createElement("b"); nm.textContent = p.name;
    row.appendChild(img); row.appendChild(nm);
    // Host taps a player to mute/unmute them (desktop admin view only).
    if (isAdmin && p.id && !mine) {
      row.title = t("muteTitle");
      row.onclick = () => toggleMute(p.id);
    }
    el.appendChild(row);
  });
}

function toggleMute(id) {
  const willMute = !mutedIds.has(id);
  if (willMute) mutedIds.add(id); else mutedIds.delete(id);
  adminPost("/api/mute", { id, muted: willMute }); // adminPost re-polls → roster restyles
}

// ---- Shared task + timer state ------------------------------------------------
// The host chooses the reference image and controls the countdown; every client
// mirrors that shared state here.
let curTask = null, deadline = null, pausedSecs = null, duration = TASK_SECONDS;
let verdict = null, firedRound = null, lastStateTs = 0, shownCustomVer = null;

function applyState(s) {
  if (!s) return;
  // Ignore state older than what we already applied (e.g. a poll response that
  // was generated just before the host switched tasks) — this used to make the
  // reference image blink away on the host's screen.
  if ((s.ts || 0) < lastStateTs) return;
  lastStateTs = s.ts || 0;
  if (s.w !== W || s.h !== H) {
    W = s.w; H = s.h;
    grid = new Array(W * H).fill(EMPTY);
    pending.clear();
    sendQueue.clear();
    resetZoom();
    layout();
  }
  deadline = s.deadline; pausedSecs = s.paused; duration = s.duration;
  verdict = s.verdict || null;
  // Update the reference on a task change OR when the custom image is replaced.
  const taskChanged = s.task !== curTask;
  const customChanged = s.task === "custom" && s.customVer !== shownCustomVer;
  if (taskChanged || customChanged) {
    curTask = s.task;
    if (curTask === "custom") {
      shownCustomVer = s.customVer;
      fetchCustomRef(); // sets refimg.src to the uploaded image (data URL)
      document.getElementById("reference").classList.remove("hide");
      document.body.classList.add("task-open");
      document.getElementById("timeup").classList.remove("show");
    } else if (curTask) {
      document.getElementById("refimg").src = "/tasks/image" + curTask + ".webp";
      document.getElementById("reference").classList.remove("hide");
      document.body.classList.add("task-open");
      document.getElementById("timeup").classList.remove("show");
    } else {
      document.getElementById("reference").classList.add("hide");
      document.body.classList.remove("task-open");
    }
    if (taskChanged) {
      document.querySelectorAll(".taskbtn").forEach((b) => b.classList.toggle("active", b.dataset.task === curTask));
      document.getElementById("uploadBtn").classList.toggle("active", curTask === "custom");
      layout();
      // Reset the similarity target; the refimg 'load' handler recomputes it
      // once the new reference finishes loading.
      computeTarget();
      updateSimilarity();
    }
  }
  // Verdict arrived for the round currently shown in the modal?
  if (verdict && verdict.round === firedRound &&
      document.getElementById("timeup").classList.contains("show")) {
    renderVerdict(verdict);
  }
}

function timerTick() {
  let secs, running = deadline !== null;
  if (running) secs = Math.max(0, Math.ceil((deadline - serverNow()) / 1000));
  else secs = pausedSecs !== null ? pausedSecs : duration;
  const el = document.getElementById("timer");
  el.textContent = fmt(secs);
  el.classList.toggle("warn", running && secs <= 10);
  document.getElementById("timerStart").textContent = (running && secs > 0) ? "⏸ " + t("pause") : "▶ " + t("start");
  if (running && secs === 0 && curTask && firedRound !== deadline) {
    firedRound = deadline;
    showTimeUp();
  }
}
setInterval(timerTick, 250);

function fmt(s) { const m = Math.floor(s / 60), ss = s % 60; return (m < 10 ? "0" : "") + m + ":" + (ss < 10 ? "0" : "") + ss; }

// ---- Host controls (admin token required) --------------------------------------
function adminPost(path, body) {
  return fetch(path, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-admin-token": ADMIN_TOKEN },
    body: JSON.stringify(body || {}),
  }).then((r) => {
    if (r.status === 403) alert(t("adminInvalid"));
    // apply the new shared state right away (clone: callers may read the body too)
    if (r.ok) r.clone().json().then((d) => { if (d && d.state) applyState(d.state); }).catch(() => {});
    pollNow(); // and fetch the grid, which may have been reset
    return r;
  }).catch(() => {});
}

function openTask(n) { adminPost("/api/task", { task: String(n), seconds: TASK_SECONDS }); }
function closeTask() { adminPost("/api/task", { task: null }); }
function toggleTimer() {
  // "Running" means the deadline is in the future — an expired round's stale
  // deadline must lead to "start" (fresh full round), not a no-op "pause".
  const running = deadline !== null && serverNow() < deadline;
  adminPost("/api/timer", { action: running ? "pause" : "start" });
}
function resetTimer() { adminPost("/api/timer", { action: "reset" }); }
function clearCanvas() {
  if (!confirm(t("confirmClear"))) return;
  adminPost("/api/clear");
}

// ---- Custom reference upload (admin) ----------------------------------------
// Host picks any image + a duration; the image is downscaled client-side, the
// grid is sized to its proportion, and a custom round starts like Bild 1/2.
let uploadImage = null, uploadDims = null;
function customDims(iw, ih) {
  const MAX = 48, MIN = 16; // longest side ~48 cells, matching the built-in tasks
  let w, h;
  if (iw >= ih) { w = MAX; h = Math.round(MAX * ih / iw); }
  else { h = MAX; w = Math.round(MAX * iw / ih); }
  return { w: Math.max(MIN, Math.min(64, w)), h: Math.max(MIN, Math.min(64, h)) };
}
function openUpload() {
  uploadImage = null; uploadDims = null;
  document.getElementById("uploadPreview").innerHTML = '<span id="uploadHint">' + t("uploadHint") + "</span>";
  document.getElementById("uploadFile").value = "";
  document.getElementById("uploadStart").disabled = true;
  document.getElementById("uploadModal").classList.add("show");
}
function closeUpload() { document.getElementById("uploadModal").classList.remove("show"); }
function handleUploadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const MAX = 480; // downscale before upload so the payload stays small
      const scale = Math.min(1, MAX / Math.max(img.naturalWidth, img.naturalHeight));
      const dw = Math.max(1, Math.round(img.naturalWidth * scale));
      const dh = Math.max(1, Math.round(img.naturalHeight * scale));
      const c = document.createElement("canvas");
      c.width = dw; c.height = dh;
      c.getContext("2d").drawImage(img, 0, 0, dw, dh);
      uploadImage = c.toDataURL("image/webp", 0.85);
      if (!uploadImage.startsWith("data:image/webp")) uploadImage = c.toDataURL("image/jpeg", 0.85);
      uploadDims = customDims(img.naturalWidth, img.naturalHeight);
      const pv = document.getElementById("uploadPreview");
      pv.innerHTML = "";
      const pimg = new Image(); pimg.src = uploadImage; pv.appendChild(pimg);
      document.getElementById("uploadStart").disabled = false;
    };
    img.onerror = () => alert(lang === "de" ? "Bild konnte nicht geladen werden." : "Could not load image.");
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}
function startUpload() {
  if (!uploadImage || !uploadDims) return;
  const min = parseInt(document.getElementById("uploadMin").value, 10) || 0;
  const sec = parseInt(document.getElementById("uploadSec").value, 10) || 0;
  const seconds = Math.min(3600, Math.max(5, min * 60 + sec));
  closeUpload();
  adminPost("/api/task", { task: "custom", image: uploadImage, w: uploadDims.w, h: uploadDims.h, seconds });
}
function fetchCustomRef() {
  fetch("/api/customref").then((r) => r.json()).then((d) => {
    if (d && d.image) document.getElementById("refimg").src = d.image;
  }).catch(() => {});
}

// ---- Time-up modal + AI rating ---------------------------------------------------
// Everyone sees the modal when the shared countdown hits zero. Only the host's
// client asks the AI judge (once); the verdict is broadcast via the shared state.
function showTimeUp() {
  const modal = document.getElementById("timeup");
  const ratingEl = document.getElementById("rating");
  const fbEl = document.getElementById("evalFeedback");
  modal.classList.add("show");
  ratingEl.className = "rating";
  ratingEl.textContent = "";
  fbEl.textContent = "";
  document.getElementById("statsList").innerHTML = "";
  if (!curTask) return;   // no reference open → nothing to grade against

  playTimelapse(); // replay how the canvas came together this round

  // Per-player leaderboard for the round that just ended (fetched once).
  fetch("/api/stats?round=" + encodeURIComponent(firedRound))
    .then((r) => r.json()).then(renderStats).catch(() => {});

  if (verdict && verdict.round === firedRound) { renderVerdict(verdict); return; }
  ratingEl.classList.add("loading");
  ratingEl.textContent = t("evalRunning");

  if (isAdmin) {
    const image = canvas.toDataURL("image/png");
    adminPost("/api/evaluate", { image, lang }) // AI rates in the host's language
      .then((r) => (r && r.ok ? r.json() : null))
      .then((v) => { if (v) renderVerdict(v); })
      .catch(() => renderVerdict({ rating: null, feedback: "" }));
  }
  // Non-admin clients: the verdict arrives with one of the next polls.
}

function renderVerdict(v) {
  const ratingEl = document.getElementById("rating");
  const fbEl = document.getElementById("evalFeedback");
  ratingEl.classList.remove("loading");
  ratingEl.textContent = (v.rating === null || v.rating === undefined) ? "–/10" : v.rating + "/10";
  fbEl.textContent = v.feedback || "";
}

// Leaderboard of who painted the most pixels this round (top painters).
function renderStats(data) {
  const el = document.getElementById("statsList");
  el.innerHTML = "";
  const list = (data && data.players) || [];
  const medals = ["🥇", "🥈", "🥉"];
  list.forEach((p, i) => {
    const row = document.createElement("div");
    row.className = "statsrow";
    const rank = document.createElement("span");
    rank.className = "rank"; rank.textContent = medals[i] || (i + 1) + ".";
    const img = new Image(); img.src = p.icon || ""; img.alt = "";
    const nm = document.createElement("b"); nm.textContent = p.name;
    const n = document.createElement("span"); n.className = "n"; n.textContent = p.count + " px";
    row.appendChild(rank); row.appendChild(img); row.appendChild(nm); row.appendChild(n);
    el.appendChild(row);
  });
}

// ---- Join lobby ------------------------------------------------------------
function buildLobby() {
  const grid = document.getElementById("icongrid");
  grid.innerHTML = "";
  ICONS.forEach((ic) => {
    const card = document.createElement("div");
    card.className = "icon";
    const img = new Image(); img.src = ic.src; img.alt = ic.id;
    card.appendChild(img);
    card.onclick = () => {
      pickedIcon = ic.src;
      document.querySelectorAll(".icon").forEach((c) => c.classList.remove("sel"));
      card.classList.add("sel");
      refreshJoinBtn();
    };
    grid.appendChild(card);
  });
  const nameInput = document.getElementById("nameInput");
  nameInput.addEventListener("input", refreshJoinBtn);
  document.getElementById("joinBtn").onclick = doJoin;
}
function refreshJoinBtn() {
  const name = document.getElementById("nameInput").value.trim();
  document.getElementById("joinBtn").disabled = !(pickedIcon && name.length > 0);
}
function doJoin() {
  const name = document.getElementById("nameInput").value.trim();
  if (!pickedIcon || !name) return;
  me = { name, icon: pickedIcon };
  // sessionStorage: survives a reload mid-round, but a freshly opened browser
  // (e.g. scanning the QR again) goes through the join screen again.
  try { sessionStorage.setItem("pc_player", JSON.stringify(me)); } catch {}
  enterCanvas();
}
function enterCanvas() {
  document.getElementById("lobby").classList.add("hide");
  // show own identity
  const meEl = document.getElementById("me");
  meEl.innerHTML = "";
  const img = new Image(); img.src = me.icon;
  const nm = document.createElement("span"); nm.textContent = me.name;
  meEl.appendChild(img); meEl.appendChild(nm);
  layout();
  pollNow();
}

function setupControls() {
  document.querySelectorAll(".taskbtn").forEach((b) => {
    b.onclick = () => { if (b.classList.contains("active")) closeTask(); else openTask(b.dataset.task); };
  });
  document.getElementById("timerStart").onclick = toggleTimer;
  document.getElementById("timerReset").onclick = resetTimer;
  document.getElementById("canvasReset").onclick = clearCanvas;
  document.getElementById("clearHeader").onclick = clearCanvas;
  document.getElementById("langToggle").onclick = toggleLang;
  document.getElementById("uploadBtn").onclick = openUpload;
  document.getElementById("uploadCancel").onclick = closeUpload;
  document.getElementById("uploadStart").onclick = startUpload;
  document.getElementById("uploadFile").addEventListener("change", (e) => handleUploadFile(e.target.files && e.target.files[0]));
  document.getElementById("refClose").onclick = closeTask;
  document.getElementById("timeupClose").onclick = () => {
    document.getElementById("timeup").classList.remove("show");
    clearInterval(replayTimer); replayTimer = null;
  };
  // Recompute the similarity target whenever a new reference image finishes loading.
  document.getElementById("refimg").addEventListener("load", () => { computeTarget(); updateSimilarity(); });
  // Tap the reference to enlarge it (mobile shows only a 76px thumbnail).
  const refbox = document.getElementById("refbox");
  document.getElementById("refimg").addEventListener("click", () => {
    const src = document.getElementById("refimg").src;
    if (!src) return;
    document.getElementById("refbox-img").src = src;
    refbox.classList.add("show");
  });
  refbox.addEventListener("click", () => refbox.classList.remove("show"));
}

// ---- QR overlay ------------------------------------------------------------
// The QR encodes the join URL (origin only — never the admin token or ?beamer).
function buildQR(el, size) {
  const img = new Image();
  img.onload = () => { el.innerHTML = ""; el.appendChild(img); };
  img.onerror = () => { el.textContent = "QR offline – URL eintippen"; el.style.color = "#333"; };
  img.width = size; img.height = size; img.alt = "QR";
  img.src = "https://api.qrserver.com/v1/create-qr-code/?size=" + size + "x" + size +
            "&data=" + encodeURIComponent(location.origin);
}
function setupQR() {
  buildQR(document.getElementById("qr"), 200);
  document.getElementById("showJoin").onclick = () => document.getElementById("overlay").classList.add("show");
  document.getElementById("hideJoin").onclick = () => document.getElementById("overlay").classList.remove("show");
}

// ---- Boot ------------------------------------------------------------------
async function boot() {
  applyLang(); // reflect the persisted language before anything is shown
  // Retry until the first load succeeds — one dropped request on crowded
  // seminar Wi-Fi must not leave a permanently blank page.
  let s = null;
  const sub = document.querySelector("#lobby .sub");
  for (let attempt = 1; !s; attempt++) {
    try {
      const r = await fetch("/api/boot", { headers: { "x-admin-token": ADMIN_TOKEN } });
      if (!r.ok) throw new Error("boot " + r.status);
      s = await r.json();
    } catch {
      sub.textContent = t("connFail");
      await new Promise((done) => setTimeout(done, Math.min(5000, 1000 * attempt)));
    }
  }
  sub.textContent = t("lobbySub");
  PALETTE = s.palette; EMPTY = s.empty; ICONS = s.icons || [];
  isAdmin = Boolean(s.admin);
  (s.muted || []).forEach((id) => mutedIds.add(id));
  document.body.classList.toggle("admin", isAdmin);
  if (urlAdmin !== null && !isAdmin) alert(t("adminSpectator"));
  clockOffset = s.now - Date.now();
  W = s.state.w; H = s.state.h;
  grid = new Array(W * H).fill(EMPTY);
  buildPalette();
  buildLobby();
  setupControls();
  setupQR();
  applyState(s.state);
  applyGrid(s.grid);
  // If the countdown already ran out before we loaded, don't pop the modal.
  if (deadline !== null && deadline <= serverNow()) firedRound = deadline;
  if (isBeamer) {
    // Projector view: no lobby, no identity — just display and show the QR.
    document.body.classList.add("beamer");
    document.getElementById("lobby").classList.add("hide");
    buildQR(document.getElementById("beamerqr"), 240);
    layout();
    pollNow();
  } else {
    // Auto-rejoin after a reload within the same browser session only.
    try {
      localStorage.removeItem("pc_player"); // clear identities saved by older versions
      const saved = JSON.parse(sessionStorage.getItem("pc_player"));
      if (saved && saved.name && saved.icon) { me = saved; enterCanvas(); }
    } catch {}
  }
  redrawAll();
  setInterval(poll, POLL_MS);
}
window.addEventListener("resize", () => { if (me || isBeamer) layout(); });
// Coming back to a hidden tab: resync right away instead of waiting for the interval.
document.addEventListener("visibilitychange", () => { if (!document.hidden) poll(); });
boot();
</script>
